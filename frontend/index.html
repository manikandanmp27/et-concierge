<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ET Concierge - Your Personal Guide to The Economic Times</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Phosphor Icons (for beautiful icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-background">
        <!-- Abstract gradient orbs for background effect -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="dashboard-container">
        <!-- Main Chat Section -->
        <section class="chat-section glass-panel">
            <header class="chat-header">
                <div>
                    <h1>ET Concierge</h1>
                    <p class="subtitle">Your AI-powered guide</p>
                </div>
                <button class="icon-button" id="clear-chat-btn" title="Clear Session">
                    <i class="ph ph-trash"></i>
                </button>
            </header>
            
            <div class="messages-container" id="messages-container">
                <div class="message assistant">
                    <div class="avatar"><i class="ph ph-robot"></i></div>
                    <div class="content">
                        Hello! I'm your ET Concierge. I'm here to help you navigate The Economic Times ecosystem. What brings you here today?
                    </div>
                </div>
                <!-- Dynamic messages will appear here -->
            </div>

            <div class="input-area">
                <form id="chat-form">
                    <input type="text" id="chat-input" placeholder="Type a message to concierge..." autocomplete="off">
                    <button type="submit" id="send-btn" class="send-button">
                        <i class="ph ph-paper-plane-right"></i>
                    </button>
                </form>
            </div>
        </section>

        <!-- Sidebar Section (Profile & Recommendations) -->
        <aside class="sidebar-section">
            <!-- Profile Card -->
            <div class="profile-card glass-panel fade-in" id="profile-container">
                <header class="section-header">
                    <h2><i class="ph ph-user"></i> Your Profile</h2>
                </header>
                <div class="profile-details" id="profile-details">
                    <div class="empty-state">
                        <i class="ph ph-user-circle-dashed empty-icon"></i>
                        <p>Chat with me to build your profile</p>
                    </div>
                </div>
            </div>

            <!-- Recommendations Card -->
            <div class="recommendations-card glass-panel fade-in" id="recommendations-container">
                <header class="section-header">
                    <h2><i class="ph ph-star"></i> Recommended for You</h2>
                </header>
                <div class="recommendations-list" id="recommendations-list">
                    <div class="empty-state">
                        <i class="ph ph-sparkle empty-icon"></i>
                        <p>Recommendations will appear here based on our conversation</p>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
